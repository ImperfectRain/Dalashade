name: Dalashade build validation

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Download Dalamud
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
        Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

    - name: Restore
      run: dotnet restore

    - name: Build Release
      run: dotnet build -c Release --no-restore

    - name: Validate repo.json
      shell: pwsh
      run: |
        Get-Content -Raw repo.json | ConvertFrom-Json | Out-Null

    - name: Validate release zip
      shell: pwsh
      run: |
        $zipPath = "releases/Dalashade-v1.1.zip"
        if (!(Test-Path $zipPath)) {
          Write-Host "$zipPath not present; skipping optional release zip validation."
          exit 0
        }

        Add-Type -AssemblyName System.IO.Compression.FileSystem
        $zip = [System.IO.Compression.ZipFile]::OpenRead($zipPath)
        try {
          $hasDll = $zip.Entries | Where-Object { $_.FullName -match '(^|/)Dalashade\.dll$' } | Select-Object -First 1
          if (-not $hasDll) {
            throw "$zipPath does not contain Dalashade.dll"
          }
        }
        finally {
          $zip.Dispose()
        }

    - name: Store artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Dalashade
        path: .\Dalashade\bin\x64\Release\*
        if-no-files-found: error
        retention-days: 1
